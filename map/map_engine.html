<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

<style>
    body {
        margin:0;
        background:#0e1117;
    }

    #map {
        height: 650px;
        width: 100%;
        border-radius: 8px;
    }

    .map-label {
        background: rgba(255,255,255,0.9);
        border: 1px solid black;
        color: black;
        font-weight: bold;
        font-size: 11px;
        padding: 2px 4px;
        border-radius: 3px;
    }

    .toolbar {
        display:grid;
        grid-template-columns: repeat(4, 1fr);
        gap:5px;
        margin-top:10px;
    }

    .btn {
        padding:10px;
        background:#ffcc00;
        border:none;
        font-weight:bold;
        font-size:11px;
        cursor:pointer;
        border-radius:4px;
    }

    .btn:hover {
        background:#ffd633;
    }
</style>
</head>

<body>

<div id="map"></div>

<div class="toolbar">
    <button class="btn" onclick="addText()">ТЕКСТ</button>
    <button class="btn" onclick="clearMap()">ОЧИСТИТЬ</button>
    <button class="btn" onclick="downloadMap()">PNG</button>
    <button class="btn" onclick="window.print()">PDF</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>

// =======================
// 1. БАЗОВАЯ КАРТА
// =======================
var map = L.map('map', {
    attributionControl:false
}).setView([48.3794, 31.1656], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    crossOrigin: true
}).addTo(map);

// =======================
// 2. СЛОЙ ОБСТАНОВКИ
// =======================
var drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

// =======================
// 3. СТИЛИ
// =======================
var zoneStyle = {
    color: 'black',
    fillColor: 'yellow',
    fillOpacity: 0.35,
    weight: 2
};

var pointStyle = L.divIcon({
    html: '<div style="background:#ffcc00;border:2px solid black;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;">☢️</div>',
    className: ''
});

// =======================
// 4. DRAW CONTROL
// =======================
var drawControl = new L.Control.Draw({
    draw: {
        polygon: { shapeOptions: zoneStyle },
        rectangle: { shapeOptions: zoneStyle },
        circle: { shapeOptions: zoneStyle },
        marker: { icon: pointStyle },
        polyline: { shapeOptions: { color: 'black', weight: 3 } }
    },
    edit: {
        featureGroup: drawnItems
    }
});

map.addControl(drawControl);

// =======================
// 5. СОЗДАНИЕ ОБЪЕКТОВ
// =======================
map.on(L.Draw.Event.CREATED, function(e) {

    var layer = e.layer;

    // единый стиль для зон
    if (layer.setStyle) {
        layer.setStyle(zoneStyle);
    }

    drawnItems.addLayer(layer);
});

// =======================
// 6. ТЕКСТОВЫЕ МЕТКИ
// =======================
function addText() {
    var text = prompt("Введите текст:");
    if (!text) return;

    map.once('click', function(e) {

        var icon = L.divIcon({
            html: '<div class="map-label">' + text + '</div>',
            className: ''
        });

        L.marker(e.latlng, { icon: icon }).addTo(drawnItems);
    });
}

// =======================
// 7. ОЧИСТКА
// =======================
function clearMap() {
    if (confirm("Очистить карту?")) {
        drawnItems.clearLayers();
    }
}

// =======================
// 8. ЭКСПОРТ PNG
// =======================
function downloadMap() {

    html2canvas(document.body, { useCORS:true, scale:2 }).then(canvas => {

        var link = document.createElement("a");
        link.download = "CBRN_map.png";
        link.href = canvas.toDataURL();
        link.click();

    });
}

</script>

</body>
</html>
